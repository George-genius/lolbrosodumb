<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CodeShell</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #050608;
        color: #e5e5e5;
        font-family: Consolas, "Fira Code", monospace;
    }
    #terminal {
        box-sizing: border-box;
        padding: 8px 12px;
        height: 100%;
        overflow-y: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
    }
    #input-line {
        display: flex;
        align-items: center;
    }
    #prompt {
        flex: 0 0 auto;
        margin-right: 4px;
    }
    #cmdline {
        flex: 1 1 auto;
        background: transparent;
        border: none;
        outline: none;
        color: #e5e5e5;
        font: inherit;
    }
    .line {
        margin: 0;
    }
    .cmd {
        color: #8aff80;
    }
    .error {
        color: #ff7070;
    }
    .info {
        color: #80bfff;
    }
    .dim {
        color: #888;
    }

    #editor-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        z-index: 9999;
        color: #e5e5e5;
    }
    #editor-header {
        padding: 4px 10px;
        background: #111;
        font-size: 13px;
        border-bottom: 1px solid #333;
    }
    #editor-ace {
        position: absolute;
        top: 26px;
        bottom: 32px;
        left: 0;
        right: 0;
    }
    #editor-footer {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 22px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 4px 10px;
        background: #111;
        border-top: 1px solid #333;
        font-size: 12px;
    }
    #editor-footer label {
    }
    #editor-footer select {
        background: #050608;
        color: #e5e5e5;
        border: 1px solid #333;
        border-radius: 3px;
        font-family: inherit;
        font-size: 12px;
    }


</style>
<script src="ace/ace.js"></script>
<script>
// Custom CDS mode for .cds files
if (window.ace) {
    ace.config.set('basePath', 'ace');
    ace.define('ace/mode/cds_highlight_rules', [
        'require', 'exports', 'module',
        'ace/lib/oop',
        'ace/mode/text_highlight_rules'
    ], function (require, exports, module) {
        var oop = require('ace/lib/oop');
        var TextHighlightRules = require('ace/mode/text_highlight_rules').TextHighlightRules;
        var CdsHighlightRules = function () {
            var keywords = (
                "app|entry|section|" +
                "echo|help|clear|pwd|ls|dir|cd|tree|"
                +
                "mkdir|touch|cat|edit|rm|del|cp|mv|"
                +
                "open|stat|du|head|tail|dl|ul|find|" +
                "grep|runjs|histroy|apt|whoami|login|useradd|userdel|" +
                "passwd|sudo|shutdown|restart|sleep|clearram|reloadsys"
            );
            var builtinConstants = (
                "true|false|null|on|off|yes|no"
            );

            this.$rules = {
                start: [
                    {
                        token: "comment.line.number-sign.cds",
                        regex: "#.*$"
                    },
                    {
                        token: "comment.line.semicolon.cds",
                        regex: ";.*$"
                    },
                    {
                        token: ["comment.line.number-sign.cds", "keyword.todo.cds"],
                        regex: "(#.*?)(TODO|FIXME|XXX)(?=.*$)"
                    },
                    {
                        token: "entity.name.section.cds",
                        regex: "^\\s*\\[[A-Za-z0-9_\\.\\-]+\\]"
                    },
                    {
                        token: ["variable.parameter.cds", "text", "keyword.operator.assignment.cds"],
                        regex: "^\\s*([A-Za-z_][A-Za-z0-9_\\-]*)(\\s*)(=)"
                    },
                    {
                        token: ["variable.parameter.cds", "keyword.operator.assignment.cds"],
                        regex: "([A-Za-z_][A-Za-z0-9_\\-]*)(\\s*=)"
                    },
                    {
                        token: "keyword.control.directive.cds",
                        regex: "@[A-Za-z_][A-Za-z0-9_]*"
                    },
                    {
                        token: "string.quoted.double.cds",
                        regex: '"[^"\\\\]*(?:\\\\.[^"\\\\]*)*"'
                    },
                    {
                        token: "string.quoted.single.cds",
                        regex: "'[^'\\\\]*(?:\\\\.[^'\\\\]*)*'"
                    },
                    {
                        token: "constant.numeric.hex.cds",
                        regex: "\\b0[xX][0-9a-fA-F]+\\b"
                    },
                    {
                        token: "constant.numeric.binary.cds",
                        regex: "\\b0[bB][01]+\\b"
                    },
                    {
                        token: "constant.numeric.float.cds",
                        regex: "\\b[0-9]+(?:\\.[0-9]+)?(?:[eE][+-]?[0-9]+)?\\b"
                    },
                    {
                        token: "constant.language.cds",
                        regex: "\\b(?:" + builtinConstants + ")\\b"
                    },
                    {
                        token: "keyword.other.cds",
                        regex: "\\b(?:" + keywords + ")\\b"
                    },
                    {
                        token: ["support.type.cds", "punctuation.separator.key-value.cds"],
                        regex: "\\b([A-Za-z_][A-Za-z0-9_\\-]*)(:)"
                    },
                    {
                        token: "keyword.operator.cds",
                        regex: "\\+|\\-|\\*|\\/|%|==|!=|<=|>=|<|>|&&|\\|\\||!"
                    },
                    {
                        token: "punctuation.operator.cds",
                        regex: "[,;]"
                    },
                    {
                        token: "paren.lparen",
                        regex: "[\\[\\(\\{]"
                    },
                    {
                        token: "paren.rparen",
                        regex: "[\\]\\)\\}]"
                    },
                    {
                        token: "text",
                        regex: "\\s+"
                    }
                ]
            };

            this.normalizeRules();
        };

        oop.inherits(CdsHighlightRules, TextHighlightRules);
        exports.CdsHighlightRules = CdsHighlightRules;
    });

    ace.define('ace/mode/cds', ['require', 'exports', 'module', 'ace/lib/oop', 'ace/mode/text', 'ace/mode/cds_highlight_rules'], function(require, exports, module) {
        var oop = require('ace/lib/oop');
        var TextMode = require('ace/mode/text').Mode;
        var CdsHighlightRules = require('ace/mode/cds_highlight_rules').CdsHighlightRules;
        var Mode = function() {
            this.HighlightRules = CdsHighlightRules;
        };
        oop.inherits(Mode, TextMode);
        (function() {
            this.$id = 'ace/mode/cds';
        }).call(Mode.prototype);
        exports.Mode = Mode;
    });
}
</script>

<body>
    <div id="terminal"></div>
    <div id="editor-overlay">
        <div id="editor-header"></div>
        <div id="editor-ace"></div>
        <div id="editor-footer">

                <option value="plain" selected>Plain</option>
                <option value="cpp">C++</option>

            </select>
        </div>
    </div>


    <script>
        (function () {
            const term = document.getElementById('terminal');
            let nativeCtx = null;
            let nativeReady = false;

            // --- DOM helpers -------------------------------------------------------
            function print(text, cls) {
                const div = document.createElement('div');
                div.className = 'line' + (cls ? ' ' + cls : '');
                div.textContent = text;
                term.appendChild(div);
                term.scrollTop = term.scrollHeight;
            }

            function printEmpty() {
                print('');
            }

            // --- Virtual multi-drive FS + Users (persistent) ----------------------
            const DRIVE_LETTERS = ['C', 'D', 'E'];

            let drives = {};          // { C: rootDir, D: rootDir, E: rootDir }
            let currentDrive = 'C';   // 'C' | 'D' | 'E'
            let currentDir = null;    // node within the current drive

            let users = [];
            let currentUser = null;
            let effectiveUser = null;
            let history = [];

            let apps = []; // CodeShell .cds app registry

            function loadApps() {
                try {
                    const raw = localStorage.getItem('CodeShell_APPS');
                    if (!raw) { apps = []; return; }
                    const parsed = JSON.parse(raw);
                    if (Array.isArray(parsed)) apps = parsed;
                    else apps = [];
                } catch (e) {
                    apps = [];
                }
            }

            function saveApps() {
                try {
                    localStorage.setItem('CodeShell_APPS', JSON.stringify(apps));
                } catch (e) {
                    // ignore
                }
            }

            function parseCds(content, fallbackId) {
                const lines = content.split(/\r?\n/);
                let section = null;
                const meta = { name: '', id: '', version: '', entry: 'run', description: '', cmd: '' };
                const scripts = {};
                let buf = [];

                function flush() {
                    if (!section) return;
                    const key = section.toLowerCase();
                    const text = buf.join('\n').trim();
                    if (!text) { buf = []; return; }
                    if (key in meta) {
                        if (key === 'cmd') {
                            // allow multiple bindings, keep full trimmed text
                            meta[key] = text.trim();
                        } else {
                            // first line only for simple meta
                            const first = text.split(/\n/)[0];
                            meta[key] = first.trim();
                        }
                    } else {
                        scripts[key] = text.split(/\n/);
                    }
                    buf = [];
                }

                for (let raw of lines) {
                    const line = raw.replace(/\t/g, '    ');
                    if (!line.trim().length) {
                        buf.push('');
                        continue;
                    }
                    if (/^\s*#/.test(line)) continue;
                    const m = line.match(/^\s*\[(.+?)\]\s*$/);
                    if (m) {
                        flush();
                        section = m[1];
                        continue;
                    }
                    buf.push(line);
                }
                flush();

                if (!meta.id) {
                    meta.id = (fallbackId || '').replace(/\.cds$/i, '') || 'app_' + Date.now();
                }
                if (!meta.name) meta.name = meta.id;
                if (!meta.version) meta.version = '1.0.0';
                if (!meta.entry) meta.entry = 'run';

                return {
                    id: meta.id,
                    name: meta.name,
                    version: meta.version,
                    entry: meta.entry,
                    description: meta.description,
                    cmd: meta.cmd,
                    scripts
                };
            }

            function ensureCdsUploadInput() {
                let input = document.getElementById('cds-upload-input');
                if (!input) {
                    input = document.createElement('input');
                    input.type = 'file';
                    input.accept = '.cds,text/plain';
                    input.style.display = 'none';
                    input.id = 'cds-upload-input';
                    document.body.appendChild(input);
                }
                return input;
            }


            function ensureUploadFileInput() {
                let input = document.getElementById('ul-file-input');
                if (!input) {
                    input = document.createElement('input');
                    input.type = 'file';
                    input.style.display = 'none';
                    input.id = 'ul-file-input';
                    document.body.appendChild(input);
                }
                return input;
            }

            function ensureUploadFolderInput() {
                let input = document.getElementById('ul-folder-input');
                if (!input) {
                    input = document.createElement('input');
                    input.type = 'file';
                    // directory upload (supported in Chromium-based browsers)
                    input.webkitdirectory = true;
                    input.style.display = 'none';
                    input.id = 'ul-folder-input';
                    document.body.appendChild(input);
                }
                return input;
            }



            function runAppById(id, scriptName, extraArgs) {
                const app = apps.find(a => a.id === id);
                if (!app) {
                    print('apt: no such app: ' + id, 'error');
                    return;
                }
                const scriptKey = (scriptName || app.entry || 'run').toLowerCase();
                const lines = app.scripts[scriptKey];
                if (!lines || !lines.length) {
                    print('apt: app ' + id + ' has no script section [' + scriptKey + ']', 'error');
                    return;
                }
                lines.forEach(rawLine => {
                    const line = String(rawLine || '').trim();
                    if (!line || /^#/.test(line)) return;
                    const parts = tokenize(line);
                    const cmd = parts[0];
                    const args = parts.slice(1);
                    const fn = commands[cmd];
                    if (!fn) {
                        print('app[' + id + ']: command not found: ' + cmd, 'error');
                    } else {
                        try {
                            fn(args);
                        } catch (e) {
                            print('app[' + id + ']: error: ' + e, 'error');
                        }
                    }
                });
            }

            function bindAppCommandFor(app) {
                if (!app.cmd) return;
                const raw = String(app.cmd || '').trim();
                if (!raw) return;
                const lines = raw.split(/\n+/);
                lines.forEach(line => {
                    const spec = line.trim();
                    if (!spec) return;
                    // syntax: name or name:section
                    const parts = spec.split(':');
                    const name = parts[0].trim();
                    const section = (parts[1] || app.entry || 'run').trim();
                    if (!/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(name)) {
                        print('apt: invalid cmd name in app ' + app.id + ': ' + name, 'error');
                        return;
                    }
                    if (commands[name]) {
                        print('apt: cannot bind cmd "' + name + '" for app ' + app.id + ' (command already exists)', 'error');
                        return;
                    }
                    commands[name] = function (args) {
                        runAppById(app.id, section, args);
                    };
                    print('apt: bound command "' + name + '" for app ' + app.id + ' -> [' + section + ']', 'info');
                });
            }

            function bindAllAppCommands() {
                apps.forEach(app => bindAppCommandFor(app));
            }

            function registerApp(app, sourceInfo) {
                const existingIndex = apps.findIndex(a => a.id === app.id);
                const entry = {
                    id: app.id,
                    name: app.name,
                    version: app.version,
                    entry: app.entry,
                    description: app.description,
                    cmd: app.cmd || '',
                    scripts: app.scripts,
                    source: sourceInfo.source,
                    path: sourceInfo.path || null,
                    installedAt: Date.now()
                };
                if (existingIndex >= 0) {
                    apps[existingIndex] = entry;
                    print('apt: updated app ' + app.id + ' (' + app.name + ')', 'info');
                } else {
                    apps.push(entry);
                    print('apt: installed app ' + app.id + ' (' + app.name + ')', 'info');
                }
                saveApps();
                bindAppCommandFor(entry);
            }

            let historyIndex = 0;
            let hereDoc = null;
            let jsRepl = null; // {on:boolean, ctx:object}

            // JS stdin bridge (for runjs scripts that want step-by-step input)
            let jsStdin = { active: false, queue: [], waiter: null };

            function jsStdinBegin() {
                jsStdin.active = true;
                updatePrompt();
            }
            function jsStdinEnd() {
                if (jsStdin.waiter) {
                    try { jsStdin.waiter(null); } catch {}
                }
                jsStdin.active = false;
                jsStdin.queue = [];
                jsStdin.waiter = null;
                updatePrompt();
            }
            function jsStdinFeed(line) {
                if (jsStdin.waiter) {
                    const r = jsStdin.waiter;
                    jsStdin.waiter = null;
                    try { r(String(line)); } catch {}
                } else {
                    jsStdin.queue.push(String(line));
                }
            }
            function jsReadLine() {
                return new Promise((resolve) => {
                    if (jsStdin.queue.length) {
                        resolve(jsStdin.queue.shift());
                        return;
                    }
                    jsStdin.waiter = resolve;
                    jsStdinBegin();
                });
            }
            let jobs = []; // {id, cmd, startedAt, status, promise, killed}
            let jobSeq = 1;
 // { fileNode, buffer: [], mode: 'write'|'append' }
            let poweredOff = false;   // for shutdown

            const editorOverlay = document.getElementById('editor-overlay');
            const editorHeader = document.getElementById('editor-header');
            const editorFooter = document.getElementById('editor-footer');
            const editorAceNode = document.getElementById('editor-ace');
            const editorFontSelect = document.getElementById('editor-font');
            const editorThemeSelect = document.getElementById('editor-theme');
            const editorModeSelect = document.getElementById('editor-mode');
            let editorActive = false;
            let editorFile = null;
            let editorAce = null;

            function initAceEditor() {
                if (editorAce) return editorAce;
                if (!window.ace) {
                    console.error('Ace editor not loaded');
                    return null;
                }
                editorAce = ace.edit(editorAceNode);
                editorAce.setOptions({
                    fontSize: '14px',
                    tabSize: 4,
                    useSoftTabs: true,
                    showPrintMargin: false,
                    highlightActiveLine: true
                });
                editorAce.setTheme('ace/theme/monokai');
                editorAce.session.setMode('ace/mode/text');
                editorAce.session.setUseWrapMode(true);
                editorAce.$blockScrolling = Infinity;
                return editorAce;
            }

            function detectModeFromName(name) {
                const lower = String(name || '').toLowerCase();
                if (lower.endsWith('.cpp') || lower.endsWith('.cc') || lower.endsWith('.cxx') || lower.endsWith('.hpp') || lower.endsWith('.hxx')) return 'cpp';
                if (lower.endsWith('.c') || lower.endsWith('.h')) return 'c';
                if (lower.endsWith('.cds')) return 'cds';
                if (lower.endsWith('.html') || lower.endsWith('.htm')) return 'html';
                if (lower.endsWith('.css')) return 'css';
                if (lower.endsWith('.js')) return 'js';
                return 'plain';
            }

            function applyEditorMode(modeKey) {
                const ed = initAceEditor();
                if (!ed) return;
                let aceMode = 'ace/mode/text';
                switch (modeKey) {
                    case 'cpp':
                    case 'c':
                        aceMode = 'ace/mode/c_cpp';
                        break;
                    case 'cds':
                        aceMode = 'ace/mode/cds';
                        break;
                    case 'html':
                        aceMode = 'ace/mode/html';
                        break;
                    case 'css':
                        aceMode = 'ace/mode/css';
                        break;
                    case 'js':
                        aceMode = 'ace/mode/javascript';
                        break;
                    case 'plain':
                    default:
                        aceMode = 'ace/mode/text';
                        break;
                }
                ed.session.setMode(aceMode);
            }

            function applyEditorTheme(theme) {
                const ed = initAceEditor();
                if (!ed) return;
                const t = theme || 'monokai';
                ed.setTheme('ace/theme/' + t);
            }

            function applyEditorFontSize(size) {
                const ed = initAceEditor();
                if (!ed) return;
                const s = parseInt(size, 10) || 14;
                ed.setFontSize(s);
            }

            function loadEditorPrefs() {
                try {
                    const raw = localStorage.getItem('CodeShell_EDITOR_PREFS');
                    if (!raw) return { fontSize: '14', theme: 'monokai', mode: null };
                    const obj = JSON.parse(raw);
                    return {
                        fontSize: String(obj.fontSize || '14'),
                        theme: obj.theme || 'monokai',
                        mode: obj.mode || null
                    };
                } catch (e) {
                    return { fontSize: '14', theme: 'monokai', mode: null };
                }
            }

            function saveEditorPrefs(prefs) {
                try {
                    localStorage.setItem('CodeShell_EDITOR_PREFS', JSON.stringify(prefs));
                } catch (e) {
                }
            }

            function syncEditorControls(prefs, detectedMode) {
                const fm = prefs.fontSize || '14';
                const th = prefs.theme || 'monokai';
                const mk = prefs.mode || detectedMode || 'plain';
                if (editorFontSelect) editorFontSelect.value = fm;
                if (editorThemeSelect) editorThemeSelect.value = th;
                if (editorModeSelect) editorModeSelect.value = mk;
                applyEditorFontSize(fm);
                applyEditorTheme(th);
                applyEditorMode(mk);
            }

            function startEditor(fileNode) {
                if (!fileNode) return;
                const ed = initAceEditor();
                if (!ed) {
                    print('edit: Ace editor not available', 'error');
                    return;
                }
                editorFile = fileNode;
                editorActive = true;
                destroyInput();
                const path = getPath(fileNode);
                editorHeader.textContent = 'CodeShell Editor - ' + path + '   [Ctrl+S: save, Esc: close]';
                ed.setValue(fileNode.content || '', -1);
                const prefs = loadEditorPrefs();
                const detected = detectModeFromName(fileNode.name || '');
                syncEditorControls(prefs, detected);
                editorOverlay.style.display = 'block';
                ed.focus();
            }

            function saveEditor() {
                if (!editorActive) return;
                const ed = initAceEditor();
                if (editorFile && ed) {
                    const newContent = ed.getValue().replace(/\r\n/g, '\n');
                    editorFile.content = newContent;
                    editorFile.modified = now();
                    if (editorFile.parent) editorFile.parent.modified = now();
                    saveState();
                    print('edit: saved ' + getPath(editorFile) + ' (' + getSize(editorFile) + ' bytes)', 'info');
                }
            }

            function closeEditor() {
                if (!editorActive) return;
                editorOverlay.style.display = 'none';
                if (editorAce) {
                    editorAce.setValue('', -1);
                }
                editorActive = false;
                editorFile = null;
                createInput();
            }

            window.addEventListener('keydown', function (e) {
                if (!editorActive) return;
                if (e.key === 's' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    saveEditor();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    closeEditor();
                }
            });

            if (editorFontSelect && editorThemeSelect && editorModeSelect) {
                editorFontSelect.addEventListener('change', function () {
                    const prefs = loadEditorPrefs();
                    prefs.fontSize = editorFontSelect.value;
                    saveEditorPrefs(prefs);
                    applyEditorFontSize(prefs.fontSize);
                });
                editorThemeSelect.addEventListener('change', function () {
                    const prefs = loadEditorPrefs();
                    prefs.theme = editorThemeSelect.value;
                    saveEditorPrefs(prefs);
                    applyEditorTheme(prefs.theme);
                });
                editorModeSelect.addEventListener('change', function () {
                    const prefs = loadEditorPrefs();
                    prefs.mode = editorModeSelect.value;
                    saveEditorPrefs(prefs);
                    applyEditorMode(prefs.mode);
                });
            }


            const STORAGE_FS = 'CodeShell_FS_MULTI';
            const STORAGE_USERS = 'CodeShell_USERS';
            const STORAGE_USER = 'CodeShell_CURRENT_USER';

            // --- IndexedDB Blob store (for large/binary files) -------------------
            const BLOB_DB = 'CodeShell_BLOBS';
            const BLOB_STORE = 'blobs';

            function idbOpen() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(BLOB_DB, 1);
                    req.onupgradeneeded = () => {
                        const db = req.result;
                        if (!db.objectStoreNames.contains(BLOB_STORE)) {
                            db.createObjectStore(BLOB_STORE);
                        }
                    };
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error || new Error('IndexedDB open failed'));
                });
            }

            function idbPut(key, blob) {
                return idbOpen().then(db => new Promise((resolve, reject) => {
                    const tx = db.transaction(BLOB_STORE, 'readwrite');
                    const st = tx.objectStore(BLOB_STORE);
                    st.put(blob, key);
                    tx.oncomplete = () => { try { db.close(); } catch {} resolve(); };
                    tx.onerror = () => { try { db.close(); } catch {} reject(tx.error || new Error('IndexedDB put failed')); };
                }));
            }

            function idbGet(key) {
                return idbOpen().then(db => new Promise((resolve, reject) => {
                    const tx = db.transaction(BLOB_STORE, 'readonly');
                    const st = tx.objectStore(BLOB_STORE);
                    const req = st.get(key);
                    req.onsuccess = () => { const val = req.result; try { db.close(); } catch {} resolve(val || null); };
                    req.onerror = () => { try { db.close(); } catch {} reject(req.error || new Error('IndexedDB get failed')); };
                }));
            }

            function idbDel(key) {
                return idbOpen().then(db => new Promise((resolve, reject) => {
                    const tx = db.transaction(BLOB_STORE, 'readwrite');
                    const st = tx.objectStore(BLOB_STORE);
                    st.delete(key);
                    tx.oncomplete = () => { try { db.close(); } catch {} resolve(); };
                    tx.onerror = () => { try { db.close(); } catch {} reject(tx.error || new Error('IndexedDB delete failed')); };
                }));
            }

            function makeBlobKey() {
                return 'blob_' + now() + '_' + Math.random().toString(16).slice(2);
            }

            function shouldStoreAsBlob(file) {
                const name = (file && file.name || '').toLowerCase();
                const type = (file && file.type || '').toLowerCase();
                const sz = (file && file.size) || 0;

                // Big files: always blob
                if (sz > 1024 * 1024) return true; // >1MB
                // Common binary/media types: blob
                if (type.startsWith('video/') || type.startsWith('audio/') || type.startsWith('image/')) return true;
                if (type === 'application/octet-stream') return true;

                // Common text-like extensions can stay as text
                if (name.match(/\.(txt|md|json|js|mjs|cjs|ts|tsx|css|html?|xml|yml|yaml|cpp|cc|cxx|hpp|hxx|c|h|cds|cds\w*|csv|log)$/)) return false;

                // Default: blob if unknown and not tiny
                return sz >= 128 * 1024;
            }

            function isTextMime(m) {
    const mime = (m || '').toLowerCase();
    return mime.startsWith('text/') || mime.includes('json') || mime.includes('xml') || mime.includes('javascript') || mime.includes('yaml') || mime.includes('csv');
}

async function readFileAsText(node) {
    if (!node || node.type !== 'file') return '';
    if (node.blobKey) {
        const b = await idbGet(node.blobKey);
        if (!b) return '';
        if (!isTextMime(node.mime || b.type)) return null; // binary
        // prevent UI death
        if ((b.size || 0) > 20 * 1024 * 1024) return '[too large to display]';
        return await b.text();
    }
    return String(node.content || '');
}

async function readFileAsBytes(node) {
    if (!node || node.type !== 'file') return new Uint8Array();
    if (node.blobKey) {
        const b = await idbGet(node.blobKey);
        if (!b) return new Uint8Array();
        const buf = await b.arrayBuffer();
        return new Uint8Array(buf);
    }
    const enc = new TextEncoder();
    return enc.encode(String(node.content || ''));
}

    const b = new Uint8Array(4);

    dv.setUint32(0, n >>> 0, true);

    return b;
}

            function deepCopyForSave(node) {
                const base = {
                    type: node.type,
                    name: node.name,
                    owner: node.owner,
                    created: node.created || now(),
                    modified: node.modified || now()
                };
                if (node.drive) base.drive = node.drive;
                if (node.type === 'file') {
                    base.content = node.content;
                    if (node.blobKey) base.blobKey = node.blobKey;
                    if (typeof node.size === 'number') base.size = node.size;
                    if (node.mime) base.mime = node.mime;
                } else {
                    base.children = node.children.map(deepCopyForSave);

                    modified: node.modified || node.created || now(),
                    parent: parent || null

                    restored.blobKey = node.blobKey || null;
                    restored.size = (typeof node.size === 'number') ? node.size : (restored.content || '').length;
                    restored.mime = node.mime || (restored.blobKey ? 'application/octet-stream' : 'text/plain');

            function getPath(node) {
                const drive = getNodeDrive(node);
                if (!node.parent) return drive + ':/';
                const parts = [];

            function findChild(dir, name) {
                return dir.children.find(c => c.name === name) || null;

            function resolvePath(path, baseDir) {
                if (!path) return baseDir;

                // Normalize backslashes -> forward
                path = path.replace(/\\/g, '/');

                // Drive-only: "C:" -> root of that drive
                if (/^[CDE]:$/i.test(path)) {
                    const d = path[0].toUpperCase();
                    return getDriveRoot(d) || null;
                }

                let cur;
                // Drive-absolute: "C:/something/else"
                const m = /^([CDE]):(.*)$/i.exec(path);
                if (m) {
                    const driveLetter = m[1].toUpperCase();
                    cur = getDriveRoot(driveLetter);
                    if (!cur) return null;
                    let rest = m[2] || '';
                    if (rest.startsWith('/')) rest = rest.slice(1);
                    path = rest;
                } else if (path.startsWith('/')) {
                    // Absolute within current drive, e.g. "/projects"
                    cur = getDriveRoot(currentDrive);
                    path = path.slice(1);
                } else {
                    // Relative
                    cur = baseDir;
                }

                if (!path) return cur;
                const parts = path.split('/').filter(p => p.length);
                for (const part of parts) {
                    if (part === '.') continue;
                    if (part === '..') {
                        if (cur.parent) cur = cur.parent;
                    } else {
                        if (cur.type !== 'dir') return null;
                        const child = findChild(cur, part);
                        if (!child) return null;
                        cur = child;
                    }
                }
                return cur;
            }

                if (!canWrite(srcNode)) {

                // First try: treat dst as an existing directory path
                const dstNode = resolvePath(dst, currentDir);
                if (dstNode && dstNode.type === 'dir') {
                    if (!canWrite(dstNode)) {
                        print('mv: permission denied', 'error');
                        return;
                    }
                    const conflict = findChild(dstNode, srcNode.name);
                    if (conflict) {
                        print('mv: destination exists: ' + srcNode.name, 'error');
                        return;
                    }
                    if (srcNode.parent) {
                        srcNode.parent.children = srcNode.parent.children.filter(c => c !== srcNode);
                        srcNode.parent.modified = now();
                    }
                    srcNode.parent = dstNode;
                    srcNode.modified = now();
                    dstNode.children.push(srcNode);
                    dstNode.modified = now();
                    saveState();
                    return;
                }

                // Fallback: dst is a new path/name (rename + optional move)
                let dstNorm = dst.replace(/\\/g, '/');
                const lastSlash = dstNorm.lastIndexOf('/');
                const dstDirPath = lastSlash >= 0 ? dstNorm.substring(0, lastSlash + 1) : '';
                const dstName = lastSlash >= 0 ? dstNorm.substring(lastSlash + 1) : dstNorm;
                const dir = dstDirPath ? ensureDir(dstDirPath) : currentDir;
                if (!dir) {

                    return;

                const exist = findChild(dir, dstName);

                    return;

                if (srcNode.parent) {
                    srcNode.parent.children = srcNode.parent.children.filter(c => c !== srcNode);

                srcNode.name = dstName;

                if (!args || args.length === 0) {

                if (!f) {

                }

                print('// running JS from ' + getPath(f), 'dim');

                // Transform: allow user code to call readline() without writing "await".
                // We rewrite `readline()` -> `await __readline()` and execute inside an async wrapper.
                const src = String(f.content || '');
                const transformed = src.replace(/\breadline\s*\(\s*\)/g, 'await __readline()');

                jsStdinEnd(); // reset any previous sessions
                try {
                    const AsyncFunction = Object.getPrototypeOf(async function () { }).constructor;

                    // Small persistent JS context across runjs calls (handy for debugging)
                    if (!jsRepl) jsRepl = { on: false, ctx: {} };
                    const ctx = jsRepl.ctx || (jsRepl.ctx = {});

                    const body =
                        "with (ctx) { return (async () => {\n" +
                        transformed +
                        "\n})() }";

                    const fn = new AsyncFunction('__readline', 'print', 'sh', 'commands', 'ctx', body);

                    const r0 = fn(
                        async () => {
                            const line = await jsReadLine(); // flips prompt into stdin mode
                            jsStdin.active = false;
                            updatePrompt();
                            return line;
                        },
                        (t) => print(String(t)),
                        async (s) => await runLine(String(s)),
                        commands,
                        ctx
                    );

                    const r = await Promise.resolve(r0);
                    const out = jsFormat(r);
                    if (out !== undefined) print(out, 'ok');
                } catch (e) {

    const recursive = args.includes('-r') || args.includes('--recursive');

    if (!root) { print('find: path not found', 'error'); return; }

    let re = null, sub = null;
    if (/^\/.+\/$/.test(patRaw)) {
        try { re = new RegExp(patRaw.slice(1, -1)); } catch { re = null; }
    }
    if (!re) sub = patRaw.toLowerCase();

    const hits = [];
    const walk = (n) => {
        if (n.type === 'file') {
            const name = (n.name || '').toLowerCase();
            if (re ? re.test(n.name) : name.includes(sub)) hits.push(getPath(n));
            return;

        (n.children || []).forEach(c => {
            if (c.type === 'dir') {
                if (re ? re.test(c.name) : (c.name || '').toLowerCase().includes(sub)) hits.push(getPath(c));
                if (recursive) walk(c);
            } else walk(c);
        });
    };
    walk(root);
    if (!hits.length) { print('find: no matches', 'dim'); return; }
    hits.forEach(p => print(p));
};

async function collectBlobStats() {
    const db = await idbOpen();
    return await new Promise((resolve) => {
        const tx = db.transaction(BLOB_STORE, 'readonly');
        const st = tx.objectStore(BLOB_STORE);
        let total = 0, count = 0;
        const req = st.openCursor();
        req.onsuccess = (e) => {
            const cur = e.target.result;
            if (cur) {
                const val = cur.value;
                total += (val && val.size) ? val.size : 0;
                count++;
                cur.continue();
            }
        };
        tx.oncomplete = () => { try { db.close(); } catch {} resolve({ total, count }); };
        tx.onerror = () => { try { db.close(); } catch {} resolve({ total, count }); };
    });
}

// cdspk: gzip-compressed streaming archive
async function makeCdspkBlob(dirNode) {
    const enc = new TextEncoder();

    async function* gen() {
        async function* emitEntry(path, type, mime, mtime, dataBytesIter) {
            const meta = { path, type, mime: mime || '', mtime: mtime || now() };
            const metaBytes = enc.encode(JSON.stringify(meta));
            yield u32le(metaBytes.length);
            yield metaBytes;

            if (type === 'dir') {
                yield u64le(0);
                return;
            }

            // data length known? we may have Blob with size, otherwise bytes length
            let size = 0n;
            let parts = [];
            if (dataBytesIter && dataBytesIter.isBlob) {
                size = BigInt(dataBytesIter.size || 0);
                yield u64le(size);
                for await (const chunk of dataBytesIter.stream()) {
                    yield new Uint8Array(chunk);
                }
            } else {
                for await (const chunk of dataBytesIter) {
                    parts.push(chunk);
                    size += BigInt(chunk.length);
                }
                yield u64le(size);
                for (const p of parts) yield p;
            }
        }

        async function* walk(n) {
            const p = getPath(n);
            if (n.type === 'dir') {
                for await (const chunk of emitEntry(p, 'dir', '', n.modified, null)) { yield chunk; }
                for (const c of (n.children || [])) { for await (const chunk2 of walk(c)) { yield chunk2; } }
            } else {
                if (n.blobKey) {
                    const b = await idbGet(n.blobKey);
                    if (!b) return;
                    const wrap = { isBlob: true, size: b.size, stream: () => b.stream() };
                    for await (const chunk of emitEntry(p, 'file', n.mime || b.type, n.modified, wrap)) { yield chunk; }
                } else {
                    const bytes = enc.encode(String(n.content || ''));
                    async function* it(){ yield bytes; }
                    for await (const chunk of emitEntry(p, 'file', n.mime || 'text/plain', n.modified, it())) { yield chunk; }
                }
            }
        }

        // magic
        yield enc.encode('CDSPK1\n');
        for await (const chunk3 of walk(dirNode)) { yield chunk3; }
    }

    const rs = new ReadableStream({
        async start(controller) {
            try {
                for await (const chunk of gen()) controller.enqueue(chunk);
                controller.close();
            } catch (e) { controller.error(e); }
        }
    });

    let stream = rs;
    if (typeof CompressionStream !== 'undefined') {
        stream = rs.pipeThrough(new CompressionStream('gzip'));
    }
    return await new Response(stream).blob();
}

async function extractCdspk(blob, targetDir) {
    const dec = new TextDecoder();
    const enc = new TextEncoder();
    let stream = blob.stream();
    if (typeof DecompressionStream !== 'undefined') {
        try { stream = stream.pipeThrough(new DecompressionStream('gzip')); } catch {}
    }
    const reader = stream.getReader();
    let buf = new Uint8Array(0);

    async function readN(n) {
        while (buf.length < n) {
            const { value, done } = await reader.read();
            if (done) break;
            const chunk = new Uint8Array(value);
            const merged = new Uint8Array(buf.length + chunk.length);
            merged.set(buf,0); merged.set(chunk,buf.length);
            buf = merged;
        }
        if (buf.length < n) throw new Error('cdspk: unexpected EOF');
        const out = buf.slice(0,n);
        buf = buf.slice(n);
        return out;
    }

    // magic
    const magic = dec.decode(await readN(6));
    if (magic !== 'CDSPK1') throw new Error('cdspk: bad magic');
    await readN(1); // newline

    while (true) {
        // try read meta length
        let head;
        try { head = await readN(4); } catch { break; }
        const dvh = new DataView(head.buffer, head.byteOffset, head.byteLength);
        const mlen = readU32(dvh,0);
        const metaBytes = await readN(mlen);
        const meta = JSON.parse(dec.decode(metaBytes));
        const lenBytes = await readN(8);
        const dvl = new DataView(lenBytes.buffer, lenBytes.byteOffset, lenBytes.byteLength);
        const dlen = Number(readU64(dvl,0));
        const rel = String(meta.path || '').replace(/^[CDE]:\/?/i,''); // strip drive
        // ensure directories
        const parts = rel.split('/').filter(Boolean);
        const name = parts.pop() || '';
        const sub = parts.join('/');
        const dir = sub ? ensurePathDir(targetDir, sub, (currentUser&&currentUser.username)||'root') : targetDir;

        if (meta.type === 'dir') {
            if (name) ensurePathDir(targetDir, sub ? (sub + '/' + name) : name, (currentUser&&currentUser.username)||'root');
            continue;
        }

        const data = await readN(dlen);
        const fileMime = meta.mime || 'application/octet-stream';
        if (isTextMime(fileMime) && dlen < 512*1024) {
            const text = dec.decode(data);
            // upsert as text
            let f = dir.children.find(c=>c.type==='file'&&c.name===name);
            if (!f) { f=createFile(name,(currentUser&&currentUser.username)||'root',text); f.parent=dir; dir.children.push(f); }
            f.content=text; f.blobKey=null; f.size=text.length; f.mime=fileMime; f.modified=now();
        } else {
            // store as blob
            let f = dir.children.find(c=>c.type==='file'&&c.name===name);
            if (!f) { f=createFile(name,(currentUser&&currentUser.username)||'root',''); f.parent=dir; dir.children.push(f); }
            const key = f.blobKey || makeBlobKey();
            f.blobKey=key; f.content=''; f.size=dlen; f.mime=fileMime; f.modified=now();
            await idbPut(key, new Blob([data], {type:fileMime}));
        }
        dir.modified=now();
    }
    saveState();
}

    const outDirPath = outPath.slice(0, outPath.length - outName.length);
    const outDir = outDirPath ? resolvePath(outDirPath, currentDir) : currentDir;
    if (!outDir || outDir.type !== 'dir') { print('pack: bad output dir', 'error'); return; }
    // save as blob file
    let f = outDir.children.find(c=>c.type==='file'&&c.name===outName);
    if (!f) { f=createFile(outName,(currentUser&&currentUser.username)||'root',''); f.parent=outDir; outDir.children.push(f); }
    const key = f.blobKey || makeBlobKey();
    f.blobKey=key; f.content=''; f.size=blob.size; f.mime='application/x-cdspk'; f.modified=now();
    await idbPut(key, blob);
    outDir.modified=now();
    saveState();
    print('pack: wrote ' + getPath(f) + ' (' + f.size + ' bytes)', 'info');
};

commands.unpack = async function (args) {
    const packPath = args[0];
    const outDirPath = args[1] || '.';
    if (!packPath) { print('unpack: usage: unpack <file.cdspk> [dir]', 'error'); return; }
    const f = ensureFile(packPath);
    if (!f) { print('unpack: no such file: ' + packPath, 'error'); return; }
    const outDir = resolvePath(outDirPath, currentDir);
    if (!outDir || outDir.type !== 'dir') { print('unpack: bad target dir: ' + outDirPath, 'error'); return; }
    let blob = null;
    if (f.blobKey) blob = await idbGet(f.blobKey);
    else blob = new Blob([String(f.content||'')], {type:'application/octet-stream'});
    if (!blob) { print('unpack: missing blob content', 'error'); return; }
    await extractCdspk(blob, outDir);
    print('unpack: done into ' + getPath(outDir), 'info');
};

            // --- Native host mode ------------------------------------------------
            function nativeBridgeAvailable() {
                return !!window.nativeFs;
            }

            function isEnvironmentMode() {

            function toNativeDisplayPath(path) {

            }

            function getPromptCwd() {
                return isEnvironmentMode() && nativeCtx && nativeCtx.cwd ? toNativeDisplayPath(nativeCtx.cwd) : getPath(currentDir);
            }

            function basenameOf(path) {
                const norm = String(path || '').replace(/\\/g, '/');
                const parts = norm.split('/').filter(Boolean);
                return parts.length ? parts[parts.length - 1] : norm;
            }

            async function ensureNativeContext() {
                if (!nativeBridgeAvailable()) return null;

            function refreshModeUi() {

            async function setNativeCwd(path) {
                const res = await window.nativeFs.changeDirectory(path, nativeCtx && nativeCtx.cwd ? nativeCtx.cwd : null);
                nativeCtx = Object.assign({}, nativeCtx || {}, { cwd: res.path, home: res.home || (nativeCtx && nativeCtx.home) });
                refreshModeUi();

            function printNativeList(entries, longMode) {
                if (!entries || !entries.length) {
                    print('<empty>', 'dim');
                    return;
                }
                if (!longMode) {
                    print(entries.map(e => e.type === 'dir' ? e.name + '/' : e.name).join('  '));
                    return;
                }
                entries.forEach(node => {
                    const typeChar = node.type === 'dir' ? 'd' : '-';
                    const size = String(node.size || 0).padStart(10, ' ');
                    const mtime = node.modifiedLocal || node.modifiedUtc || '';
                    const name = node.type === 'dir' ? node.name + '/' : node.name;
                    print(typeChar + ' ' + size + '  ' + mtime + '  ' + name);
                });

            function printNumberedText(text) {
                const lines = String(text || '').split(/\r?\n/);
                lines.forEach((line, i) => print(String(i + 1).padStart(4, ' ') + ' | ' + line));
            }

            async function runNativeTree(pathArg) {
                const ctx = await ensureNativeContext();
                const start = await window.nativeFs.changeDirectory(pathArg || '.', ctx.cwd);
                print(toNativeDisplayPath(start.path), 'info');
                async function walk(dirPath, prefix) {
                    const res = await window.nativeFs.list(dirPath, null);
                    const entries = (res.entries || []).slice().sort((a, b) => a.name.localeCompare(b.name));
                    for (let i = 0; i < entries.length; i++) {
                        const e = entries[i];
                        const last = i === entries.length - 1;
                        const branch = last ? '└─ ' : '├─ ';
                        print(prefix + branch + e.name + (e.type === 'dir' ? '/' : ''));
                        if (e.type === 'dir') {
                            await walk(e.path, prefix + (last ? '   ' : '│  '));
                        }
                    }
                }
                await walk(start.path, '');
            }

            async function handleNativeCommand(cmd, args) {
                const ctx = await ensureNativeContext();
                switch (cmd) {
                    case 'pwd':
                        print(toNativeDisplayPath(ctx.cwd));

                    case 'cd': {
                        const target = args[0] || (ctx.home || ctx.cwd);
                        const res = await setNativeCwd(target);

                    case 'ls': {
                        let longMode = false;

                        if (args[0] === '-l' || args[0] === '--long') { longMode = true; pathArg = args[1] || '.'; }
                        else pathArg = args[0] || '.';
                        const res = await window.nativeFs.list(pathArg, ctx.cwd);

                    }
                    case 'dir': {
                        const res = await window.nativeFs.list(args[0] || '.', ctx.cwd);

                    case 'cp':

                    case 'mv':

                        print('mv: moved', 'info');

                    case 'stat': {
                        if (!args[0]) { print('stat: missing path', 'error'); return true; }
                        const res = await window.nativeFs.stat(args[0], ctx.cwd, false);
                        print('path: ' + toNativeDisplayPath(res.path));

                        if (res.exists) {
                            print('type: ' + res.type);
                            print('size: ' + (res.size || 0) + ' bytes');
                            print('created: ' + (res.createdLocal || res.createdUtc || ''));

                    case 'head':

                        (res.items || []).forEach(item => print(String(item.size).padStart(10, ' ') + '  ' + toNativeDisplayPath(item.path)));
                        if (!(res.items || []).length) print('storage: nothing found', 'dim');
                        return true;

            // --- Prompt + input management ----------------------------------------
            let inputContainer = null;
            let promptSpan = null;
            let inputBox = null;
            let shellReadRequest = null;

            function updatePrompt() {
                if (!promptSpan) return;
                const u = effectiveUser || currentUser;
                const user = u ? u.username : 'guest';
                const role = u ? (u.role || 'user') : 'guest';
                const cwd = getPromptCwd();
                const sigil = (user === 'root' || role === 'admin') ? '#' : '$';
                promptSpan.textContent = shellReadRequest ? (shellReadRequest.promptText || (shellReadRequest.secret ? 'password>' : 'input>'))
                    : (jsRepl && jsRepl.on) ? ('js ' + user + '@codeshell:' + cwd + sigil)
                    : (jsStdin && jsStdin.active) ? ('stdin ' + user + '@codeshell:' + cwd + '>')
                    : (user + '@codeshell:' + cwd + sigil);
                if (inputBox) inputBox.type = (shellReadRequest && shellReadRequest.secret) ? 'password' : 'text';
            }

            async function readShellInput(message, options) {
                options = options || {};
                const secret = !!options.secret;
                const promptText = options.promptText || (secret ? 'password>' : 'input>');
                if (message) print(message, 'info');
                return new Promise(function (resolve) {
                    shellReadRequest = {
                        secret: secret,
                        promptText: promptText,
                        resolve: resolve
                    };
                    if (inputBox) {
                        inputBox.value = '';
                        inputBox.type = secret ? 'password' : 'text';
                        inputBox.focus();
                    }
                    updatePrompt();
                });
            }
            function jsFormat(v) {
                if (v === undefined) return undefined;
                if (typeof v === 'string') return v;
                if (typeof v === 'number' || typeof v === 'boolean' || v === null) return String(v);
                try { return JSON.stringify(v, null, 2); } catch (_) { return String(v); }
            }

            function startJsRepl() {
                if (!jsRepl) jsRepl = { on: true, ctx: {} };
                jsRepl.on = true;
                jsRepl.ctx = jsRepl.ctx || {};
                print('=== JS REPL Mode ===', 'info');
                print('Type JavaScript code line-by-line. Results print automatically. Promises are awaited.', 'info');
                print('Commands: .exit  |  !<shell command> (e.g. !ls -l)  |  .help', 'info');
                updatePrompt();
            }

            function stopJsRepl() {
                if (jsRepl) jsRepl.on = false;
                print('JS REPL exited.', 'info');
                updatePrompt();
            }

            async function evalJsLine(code) {
                const line = code.trim();
                if (!jsRepl || !jsRepl.on) return;
                if (!line) return;

                if (line === '.exit' || line === 'exit' || line === 'quit' || line === ':q') {
                    stopJsRepl();
                    return;
                }
                if (line === '.help') {
                    print('JS REPL tips:', 'info');
                    print('  - Write normal JS. If it returns something, it prints.', 'info');
                    print('  - If it returns a Promise, it is awaited automatically.', 'info');
                    print('  - Use !<cmd> to run a CodeShell command from JS mode.', 'info');
                    print('  - Variables persist in a shared context object.', 'info');
                    print('    Example: x = 123;  x + 1', 'info');
                    return;
                }
                if (line[0] === '!') {
                    await runLine(line.slice(1));
                    return;
                }

                const ctx = jsRepl.ctx || (jsRepl.ctx = {});
                const AsyncFunction = Object.getPrototypeOf(async function () { }).constructor;

                try {
                    const fn = new AsyncFunction('ctx', 'print', 'sh', 'commands', 'code',
                        'with (ctx) { return eval(code); }'
                    );

                    const r0 = fn(ctx,
                        (t) => print(String(t)),
                        async (s) => await runLine(String(s)),
                        commands,
                        code
                    );

                    const r = await Promise.resolve(r0);
                    ctx._ = r;

                    const out = jsFormat(r);
                    if (out !== undefined) print(out, 'ok');
                } catch (e) {
                    print('js error: ' + (e && e.message ? e.message : String(e)), 'err');
                }
            }


            function createInput() {
                if (poweredOff) return;
                inputContainer = document.createElement('div');
                inputContainer.id = 'input-line';
                promptSpan = document.createElement('span');
                promptSpan.id = 'prompt';
                promptSpan.className = 'cmd';
                inputBox = document.createElement('input');
                inputBox.id = 'cmdline';
                inputBox.autocomplete = 'off';
                inputBox.spellcheck = false;
                inputBox.type = 'text';
                inputContainer.appendChild(promptSpan);
                inputContainer.appendChild(inputBox);
                term.appendChild(inputContainer);
                updatePrompt();
                term.scrollTop = term.scrollHeight;

                inputBox.addEventListener('keydown', onKeyDown);
                inputBox.focus();
            }

            function destroyInput() {
                if (!inputContainer) return;
                if (inputBox) inputBox.removeEventListener('keydown', onKeyDown);
                inputContainer.remove();
                inputContainer = null;
                inputBox = null;
                promptSpan = null;
            }

            async function onKeyDown(e) {
                // 使用事件目标而不是全局 inputBox，避免 destroyInput() 后变成 null
                const box = e.currentTarget || inputBox;
                if (!box) return;
                if (!box.isConnected) return;

                if (shellReadRequest && e.key === 'Escape') {
                    e.preventDefault();
                    const req = shellReadRequest;
                    shellReadRequest = null;
                    const ptxt = promptSpan && promptSpan.textContent ? promptSpan.textContent : (req.promptText || (req.secret ? 'password>' : 'input>'));
                    print(ptxt + ' [cancelled]', 'cmd');
                    box.value = '';
                    box.type = 'text';
                    updatePrompt();
                    req.resolve(null);
                    return;
                }

                if (e.key === 'Enter') {
                    e.preventDefault();
                    const text = box.value;

                    // 0) Terminal prompt/secret reads
                    if (shellReadRequest) {
                        const req = shellReadRequest;
                        shellReadRequest = null;
                        const shown = req.secret ? '*'.repeat(text.length) : text;
                        const ptxt = promptSpan && promptSpan.textContent ? promptSpan.textContent : (req.promptText || (req.secret ? 'password>' : 'input>'));
                        print(ptxt + ' ' + shown, 'cmd');
                        box.value = '';
                        box.type = 'text';
                        updatePrompt();
                        req.resolve(text);
                        return;
                    }

                    // 1) Here-doc consumes lines
                    if (hereDoc) {
                        handleHereDocLine(text);
                        box.value = '';
                        return;
                    }

                    // 2) JS stdin (runjs script waiting for input)
                    if (jsStdin && jsStdin.active) {
                        jsStdinFeed(text);
                        box.value = '';
                        return;
                    }

                    // 3) JS REPL mode
                    if (jsRepl && jsRepl.on) {
                        await evalJsLine(text);
                        box.value = '';
                        return;
                    }

                    // 4) Normal shell command
                    runLine(text);
                    box.value = '';
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (!history.length) return;
                    historyIndex = Math.max(0, historyIndex - 1);
                    box.value = history[historyIndex] || '';
                    setTimeout(() => {
                        if (box.isConnected) box.setSelectionRange(box.value.length, box.value.length);
                    }, 0);
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (!history.length) return;
                    historyIndex = Math.min(history.length, historyIndex + 1);
                    box.value = history[historyIndex] || '';
                    setTimeout(() => {
                        if (box.isConnected) box.setSelectionRange(box.value.length, box.value.length);
                    }, 0);
                }
            }

            function handleHereDocLine(text) {
                if (text === '.') {
                    const f = hereDoc.fileNode;
                    if (hereDoc.mode === 'write') {
                        f.content = hereDoc.buffer.join('\n');
                    } else if (hereDoc.mode === 'append') {
                        const base = f.content ? f.content + '\n' : '';
                        f.content = base + hereDoc.buffer.join('\n');
                    }
                    f.modified = now();
                    if (f.parent) f.parent.modified = now();
                    hereDoc = null;
                    print('write: saved ' + getPath(f), 'info');
                    saveState();
                    return;
                }
                hereDoc.buffer.push(text);
                print(text);
            }

            async function runLine(line) {
    let trimmed = (line || '').trim();
    const u = effectiveUser || currentUser;
    const _user = u ? u.username : 'guest';
    const _role = u ? (u.role || 'user') : 'guest';
    const _cwd = getPath(currentDir);
    const _sigil = (_user === 'root' || _role === 'admin') ? '#' : '$';
    const promptText = (promptSpan && promptSpan.textContent) ? promptSpan.textContent : (_user + '@codeshell:' + _cwd + _sigil);
    destroyInput();
    print(promptText + ' ' + trimmed, 'cmd');

    if (!trimmed) {
        if (!poweredOff) createInput();
        return;
    }

    // Background execution: trailing "&"
    let bg = false;
    if (/\s&$/.test(trimmed)) {
        bg = true;
        trimmed = trimmed.replace(/\s&$/, '').trim();
    }

    // Bare drive command: "C:" / "D:" / "E:"
    if (/^[CDE]:$/i.test(trimmed)) {
        const d = trimmed[0].toUpperCase();
        if (isEnvironmentMode()) {
            try {
                await setNativeCwd(d + ':/');
            } catch (e) {
                print('cd: drive not found: ' + d + ':', 'error');
            }
        } else {
            switchDrive(d);
        }
        if (!poweredOff) createInput();
        return;
    }

    history.push(trimmed + (bg ? ' &' : ''));
    historyIndex = history.length;

    const parts = tokenize(trimmed);
    const cmd = parts[0];
    const args = parts.slice(1);
    const fn = commands[cmd];

    const runOne = async () => {
        try {
            if (isEnvironmentMode()) {
                const handled = await handleNativeCommand(cmd, args);
                if (handled) return;
            }
            if (!fn) {
                print('command not found: ' + cmd, 'error');
                return;
            }
            await Promise.resolve(fn(args));
        } catch (e) {
            print('error: ' + e, 'error');
        }
    };

    if (bg) {
        const id = jobSeq++;
        const job = { id, cmd: trimmed, startedAt: now(), status: 'running', killed: false, promise: null };
        job.promise = (async () => {
            try {
                await runOne();
                job.status = job.killed ? 'killed' : 'done';
            } catch (e) {
                job.status = 'error';
            }
            // notify
            print('[job ' + job.id + '] ' + job.status + ': ' + job.cmd, job.status === 'done' ? 'info' : 'error');
            saveState();
        })();
        jobs.push(job);
        print('[job ' + id + '] started: ' + trimmed, 'info');
        if (!poweredOff) createInput();
        return;
    }

    await runOne();
    if (!poweredOff) createInput();
}
// --- Init --------------------------------------------------------------
            loadState();
            print('CodeShell desktop host ready.');
            print('Drives: C:, D:, E:  |  Default admin: root(passwd: codeshell)');
            print('Type "help" to see all commands.');
            print('Use "hostinfo" to view desktop host details.');
            printEmpty();
            ensureNativeContext().catch(function () { }).finally(function () {
                createInput();
            });
        })();
    </script>
